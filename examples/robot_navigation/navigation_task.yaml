task_name: "Hybrid Navigation"
description: "AstiPioneerHybrid navigates to a target point."

scene_file: "examples/robot_navigation/Navigation.ttt"

robots_setup:
  - name: "AstiPioneerHybrid"
    type: "AstiPioneerHybrid"

environment_objects:
  - name: "NavTarget"
    type: "static_target"

learning_objective:
  type: "navigate"
  target_object: "NavTarget"
  success_threshold_distance: 0.2