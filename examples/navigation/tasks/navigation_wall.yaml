task_name: "Wall Navigation"
description: "Navigate to target with a single wall obstacle"
scene_file: "examples/navigation/scenes/navigation_wall.ttt"
robots_setup:
  - name: "AstiPioneerHybrid"
    type: "AstiPioneerHybrid"
environment_objects:
  - name: "NavTarget"
    type: "static_target"
learning_objective:
  type: "navigate"
  target_object: "NavTarget"
  success_threshold_distance: 0.2
max_episode_steps: 400  # Increased for wall navigation
possible_target_positions:
  - name: "TargetPos1"
  - name: "TargetPos2"
  - name: "TargetPos3"